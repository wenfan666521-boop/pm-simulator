<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摸鱼模拟器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; background: #001f3f; }
    
    .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; }
    
    .tank-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.3); }
    .tank-title { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,.5); }
    
    .fish-tank { flex: 1; background: linear-gradient(180deg, #001f3f 0%, #003366 50%, #002244 100%); position: relative; overflow: hidden; }
    .tank-water { position: relative; width: 100%; height: 100%; }
    
    .fish { position: absolute; font-size: 24px; z-index: 10; }
    .fish.bubble { font-size: 16px; color: rgba(255,255,255,.7); animation: float-up 3s ease-in-out infinite; }
    
    @keyframes float-up {
      0% { transform: translateY(0) translateX(0); opacity: 0.7; }
      50% { transform: translateY(-30px) translateX(10px); opacity: 0.9; }
      100% { transform: translateY(-60px) translateX(-5px); opacity: 0; }
    }
    
    .tank-controls { display: flex; justify-content: center; gap: 15px; padding: 15px 20px; background: rgba(0,0,0,0.3); }
    .tank-btn { padding: 10px 20px; background: rgba(255,255,255,.2); border: none; border-radius: 25px; color: #fff; font-size: 14px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; }
    .tank-btn:hover { background: rgba(255,255,255,.3); transform: scale(1.05); }
    
    .fish-counter { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.5); padding: 5px 10px; border-radius: 15px; color: #fff; font-size: 12px; }

  /* 送礼系统样式 */
  .gift-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 30px; border-radius: 20px; color: #fff; width: 400px; z-index: 1001; box-shadow: 0 15px 50px rgba(0,0,0,0.5); }
  .gift-panel h3 { text-align: center; margin-bottom: 20px; font-size: 20px; }
  .gift-section { margin-bottom: 20px; }
  .gift-section input, .gift-section textarea { width: 100%; padding: 10px; border: none; border-radius: 10px; background: rgba(255,255,255,0.1); color: #fff; margin-bottom: 10px; }
  .gift-section textarea { height: 80px; resize: none; }
  .gift-section button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; cursor: pointer; font-size: 14px; }
  .gift-section button:hover { transform: scale(1.02); }
  .gift-code-display { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 15px; word-break: break-all; text-align: center; font-family: monospace; }
  .gift-code-display code { color: #4ade80; }
  .gift-close { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 20px; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="tank-header">
    <h1 class="tank-title">🐠 我的鱼缸</h1>
    <div style="display:flex;gap:10px;">
      <button class="tank-btn" onclick="toggleFullscreen()" id="toggleBtn" style="padding:8px 15px;font-size:12px;">🖥️ 全屏</button>
      <button class="tank-btn" onclick="showAchievements()" style="padding:8px 15px;font-size:12px;">🏆 成就</button>
    </div>
  </div>
  
  <div class="fish-tank" id="fishTank">
    <div class="tank-water" id="tankWater">
      <div class="fish-counter">鱼的数量: <span id="fishCount">0</span></div>
    </div>
  </div>
  
  <div class="tank-controls">
    <button class="tank-btn" id="addFishBtn" onclick="addRandomFish()">➕ 添加鱼</button>
    <button class="tank-btn" id="feedFishBtn" onclick="feedFish()">🍽️ 喂鱼</button>
    <button class="tank-btn" onclick="cleanTank()">🧹 清理</button>
  </div>
  
  <div class="tank-controls" style="background:rgba(0,0,0,0.4);">
    <button class="tank-btn" onclick="showGiftPanel()">🎁 送礼</button>
    <button class="tank-btn" onclick="showReceivePanel()">📬 收礼</button>
  </div>
</div>

<script>
  const fishTypes = ['🐠', '🐟', '🦈', '🐙', '🦑', '🦀', '🦐', '🐚'];
  const plantTypes = ['🍀', '🌱', '🌿', '🪸'];
  let fishes = [];
  let bubbles = [];
  let plants = [];
  let fishIdCounter = 0;
  let plantIdCounter = 0;
  let lastAddFishTime = 0; // 上次添加鱼的时间
  const ADD_FISH_COOLDOWN = 30 * 60 * 1000; // 30分钟冷却时间
  let lastFeedFishTime = 0; // 上次喂鱼的时间
  const FEED_FISH_COOLDOWN = 15 * 60 * 1000; // 15分钟喂鱼冷却时间
  let achievements = []; // 已解锁的成就
  
  // 统计数据
  let stats = {
    addFishClicks: 0,      // 点击添加鱼按钮次数
    feedFishClicks: 0,     // 点击喂鱼按钮次数
    successfulFeeds: 0,     // 成功喂鱼次数（鱼实际变大）
    plantsCollected: 0,     // 收集水草次数
    cleanCount: 0,          // 清理次数
    petFishClicks: 0,      // 点击鱼的次数（摸鱼）
    giftsSent: 0,           // 送礼次数
    giftsReceived: 0       // 收礼次数
  };
  
  // 物品到emoji的本地映射（备用方案）
  const itemToEmojiMap = {
    '金鱼': '🐠', '小鱼': '🐟', '鲨鱼': '🦈', '章鱼': '🐙', '乌贼': '🦑',
    '螃蟹': '🦀', '虾': '🦐', '贝壳': '🐚', '海马': '🐴', '海豚': '🐬',
    '鲸鱼': '🐳', '水母': '🪼', '乌龟': '🐢', '珊瑚': '🪸', '海星': '⭐',
    '海胆': '🦔', '龙虾': '🦞', '河豚': '🐡', '飞鱼': '🐠', '热带鱼': '🐠',
    '神仙鱼': '🐠', '斗鱼': '🐟', '锦鲤': '🐟', '魟鱼': '🦈', '鲨鱼': '🦈',
    '青蛙': '🐸', '鸭子': '🦆', '天鹅': '🦢', '鲸鲨': '🦈', '海豹': '🦭',
    '海狮': '🦭', '海象': '🦣', '三文鱼': '🐟', '金枪鱼': '🐟', '鳗鱼': '🐟',
    '海龟': '🐢', '蜥蜴': '🦎', '蛇': '🐍', '恐龙': '🦕', '龙': '🐉',
    '独角兽': '🦄', '凤凰': '🦅', '鹰': '🦅', '鹦鹉': '🦜', '猫': '🐱',
    '狗': '🐶', '兔子': '🐰', '熊猫': '🐼', '狐狸': '🦊', '熊': '🐻',
    '老虎': '🐯', '狮子': '🦁', '豹': '🐆', '马': '🐴', '鹿': '🦌',
    '牛': '🐮', '猪': '🐷', '羊': '🐑', '鸡': '🐔', '鹰': '🦅',
    '孔雀': '🦚', '火烈鸟': '🦩', '鸽子': '🐦', '猫头鹰': '🦉', '蝴蝶': '🦋',
    '蜜蜂': '🐝', '瓢虫': '🐞', '蚂蚁': '🐜', '蜗牛': '🐌', '毛毛虫': '🐛'
  };
  
  // 检测是否在iframe中
  const isInIframe = window.self !== window.top;
  
  // 全屏切换函数
  function toggleFullscreen() {
    if (isInIframe) {
      // 在iframe中，打开新窗口（全屏版本）
      window.open('fish-tank.html', '_blank');
    } else {
      // 在新窗口中，显示欢迎弹窗
      alert('欢迎回小星工具箱首页看看：https://aowuaowu2026.xyz/');
    }
  }
  
  // 初始化
  function init() {
    loadFishFromStorage();
    setInterval(generateBubble, 2000);
    setInterval(updateFishPositions, 100); // 每100ms更新，让游动更流畅
    setInterval(updateAddFishButton, 1000); // 每秒更新添加按钮状态
    setInterval(updateFeedFishButton, 1000); // 每秒更新喂鱼按钮状态
    setInterval(schedulePlantGenerate, 1000); // 检查是否需要生成水草
    updateAddFishButton();
    updateFeedFishButton();
    schedulePlantGenerate(); // 立即执行一次
    
    // 根据模式更新按钮文字
    const toggleBtn = document.getElementById('toggleBtn');
    if (toggleBtn) {
      toggleBtn.textContent = isInIframe ? '🖥️ 全屏' : '🌟小星';
    }
  }
  
  // 随机安排下次生成水草的时间
  let nextPlantGenerateTime = 0;
  function schedulePlantGenerate() {
    const now = Date.now();
    if (now >= nextPlantGenerateTime) {
      generateRandomPlant();
      nextPlantGenerateTime = now + Math.random() * 300 * 1000; // 0-300秒
    }
  }
  
  // 生成随机水草/珊瑚
  function generateRandomPlant() {
    const tank = document.getElementById('tankWater');
    if (!tank) return;
    
    // 检查水草数量是否达到上限50
    if (plants.length >= 50) return;
    
    const tankWidth = tank.offsetWidth;
    const tankHeight = tank.offsetHeight;
    const plantType = plantTypes[Math.floor(Math.random() * plantTypes.length)];
    const x = Math.random() * (tankWidth - 30);
    const y = tankHeight - 50; // 生成在水缸底部
    
    const plant = document.createElement('div');
    plant.className = 'plant';
    plant.textContent = plantType;
    plant.style.left = x + 'px';
    plant.style.bottom = '10px';
    plant.style.fontSize = '24px';
    plant.style.position = 'absolute';
    plant.style.cursor = 'pointer';
    plant.style.transition = 'transform 0.2s';
    plant.id = 'plant-' + plantIdCounter++;
    plant.onclick = () => collectPlant(plant.id);
    
    tank.appendChild(plant);
    plants.push({ id: plant.id, type: plantType, x, y });
  }
  
  // 收集水草，减少喂鱼冷却1分钟
  function collectPlant(plantId) {
    const plantEl = document.getElementById(plantId);
    if (!plantEl) return;
    
    stats.plantsCollected++; // 记录收集水草次数
    checkAchievements(); // 检查成就
    
    // 减少喂鱼冷却1分钟
    if (!canFeedFish()) {
      lastFeedFishTime = Math.max(0, lastFeedFishTime - 60000);
      updateFeedFishButton();
    }
    
    // 收集动画
    plantEl.style.transform = 'scale(0)';
    plantEl.style.opacity = '0';
    setTimeout(() => {
      if (plantEl.parentNode) {
        plantEl.parentNode.removeChild(plantEl);
      }
    }, 200);
    
    plants = plants.filter(p => p.id !== plantId);
    saveFishToStorage();
  }
  
  // ========== 送礼系统 ==========
  
  // 生成礼物代码
  function generateGiftCode(itemName, senderName, blessing) {
    // 语义识别 - 尝试多种匹配方式
    const emoji = recognizeItem(itemName);
    
    // 构建礼物数据
    const giftData = {
      emoji: emoji,
      sender: senderName || '神秘好友',
      blessing: blessing || '祝你养鱼开心！',
      timestamp: Date.now()
    };
    
    // 编码为 base64
    return btoa(JSON.stringify(giftData));
  }
  
  // 语义识别物品
  function recognizeItem(itemName) {
    // 本地映射表优先匹配
    for (const [key, emoji] of Object.entries(itemToEmojiMap)) {
      if (itemName.includes(key) || key.includes(itemName)) {
        return emoji;
      }
    }
    
    // 没有匹配到则返回默认礼物
    return '🎁';
  }
  
  // 解析礼物代码
  function parseGiftCode(code) {
    try {
      // 提取【】中间的内容
      const match = code.match(/【([^】]+)】/);
      if (!match) {
        // 兼容没有【】包裹的情况，直接用原文
        return JSON.parse(decodeURIComponent(atob(code.trim())));
      }
      const giftCode = match[1];
      const decoded = decodeURIComponent(atob(giftCode));
      return JSON.parse(decoded);
    } catch {
      return null;
    }
  }
  
  // 全局变量保存当前送礼面板
  let currentGiftPanel = null;
  
  // 显示送礼面板
  function showGiftPanel() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    
    const giftPanel = document.createElement('div');
    giftPanel.className = 'gift-panel';
    giftPanel.innerHTML = `
      <span class="gift-close" onclick="closeGiftPanel()">✕</span>
      <h3>🎁 送给好友</h3>
      <div class="gift-section">
        <input type="text" id="giftSenderName" placeholder="你的名字">
        <textarea id="giftBlessing" placeholder="输入祝福语"></textarea>
        <button id="confirmGiftBtn">确认礼物</button>
      </div>
      <div id="giftResult" class="gift-section" style="display:none;">
        <h4>🎁 礼物确认</h4>
        <div style="text-align:center;margin:20px 0;">
          <div style="font-size:48px;margin-bottom:10px;">🎁</div>
          <div style="font-size:14px;">礼物：随机鱼</div>
          <div style="font-size:12px;opacity:0.8;margin:10px 0;">祝福：你的祝福语</div>
        </div>
        <button id="generateCodeBtn" style="display:none;">生成礼物代码</button>
        <div id="giftCodeDisplay" class="gift-code-display" style="display:none;"></div>
      </div>
    `;
    
    // 保存当前面板引用
    currentGiftPanel = giftPanel;
    
    // 绑定按钮事件
    giftPanel.querySelector('#confirmGiftBtn').onclick = confirmGift;
    giftPanel.querySelector('#generateCodeBtn').onclick = generateGiftCode;
    
    overlay.appendChild(giftPanel);
    document.body.appendChild(overlay);
  }
  
  function closeGiftPanel() {
    if (currentGiftPanel && currentGiftPanel.parentNode) {
      currentGiftPanel.parentNode.remove();
    }
    currentGiftPanel = null;
  }
  
  let currentReceivedGift = null; // 当前收到的礼物数据
  let currentGiftEmoji = null; // 当前选择的礼物emoji
  
  // 显示收礼面板
  function showReceivePanel() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    
    const receivePanel = document.createElement('div');
    receivePanel.className = 'gift-panel';
    receivePanel.innerHTML = `
      <span class="gift-close" onclick="this.parentNode.parentNode.remove()">✕</span>
      <h3>📬 收取礼物</h3>
      <div class="gift-section">
        <input type="text" id="receiveCodeInput" placeholder="粘贴礼物代码">
        <button id="confirmReceiveBtn">确认收取</button>
      </div>
      <div id="receiveResult" class="gift-section" style="display:none;">
        <h4>🎁 礼物预览</h4>
        <div style="text-align:center;margin:20px 0;">
          <div style="font-size:48px;margin-bottom:10px;">🎁</div>
          <div style="font-size:14px;">礼物：预览</div>
          <div style="font-size:12px;opacity:0.8;margin:10px 0;">祝福语</div>
          <div style="font-size:11px;opacity:0.6;">送礼人</div>
        </div>
        <button id="addToTankBtn">放入鱼缸</button>
      </div>
    `;
    
    // 绑定按钮事件
    receivePanel.querySelector('#confirmReceiveBtn').onclick = confirmReceive;
    receivePanel.querySelector('#addToTankBtn').onclick = addReceivedFish;
    
    overlay.appendChild(receivePanel);
    document.body.appendChild(overlay);
  }
  
  // 确认收取礼物
  function confirmReceive() {
    const code = document.getElementById('receiveCodeInput').value;
    
    if (!code) {
      alert('请输入礼物代码');
      return;
    }
    
    const giftData = parseGiftCode(code);
    
    if (!giftData) {
      alert('无效的礼物代码');
      return;
    }
    
    // 显示礼物预览
    const resultDiv = document.getElementById('receiveResult');
    resultDiv.style.display = 'block';
    
    resultDiv.querySelector('div').innerHTML = `
      <div style="font-size:48px;margin-bottom:10px;">${giftData.emoji}</div>
      <div style="font-size:14px;">礼物：${giftData.emoji}</div>
      <div style="font-size:12px;opacity:0.8;margin:10px 0;">祝福：${giftData.blessing}</div>
      <div style="font-size:11px;opacity:0.6;">—— ${giftData.sender}</div>
    `;
    
    // 保存当前礼物数据
    currentReceivedGift = giftData;
  }
  
  // 将收到的礼物鱼放入鱼缸
  function addReceivedFish() {
    if (!currentReceivedGift) return;
    
    const tank = document.getElementById('tankWater');
    const x = Math.random() * (tank.offsetWidth - 40);
    const y = Math.random() * (tank.offsetHeight - 40);
    const fish = document.createElement('div');
    fish.className = 'fish';
    fish.textContent = currentReceivedGift.emoji;
    fish.style.left = x + 'px';
    fish.style.top = y + 'px';
    fish.id = 'fish-' + fishIdCounter++;
    fish.onclick = () => petFish(fish.id);
    tank.appendChild(fish);
    
    // 注册到鱼群数组（驱动游动）
    fishes.push({
      id: fish.id,
      type: currentReceivedGift.emoji,
      x: x,
      y: y,
      dx: (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 8),
      dy: (Math.random() - 0.5) * 3,
      feedCount: 0
    });
    
    // 更新统计
    stats.giftsReceived++;
    saveFishToStorage();
    
    // 关闭弹窗
    const overlay = document.querySelector('.gift-panel').parentNode;
    if (overlay) overlay.remove();
    
    // 显示祝福弹窗
    showBlessingPopup(currentReceivedGift.sender, currentReceivedGift.blessing);
    
    currentReceivedGift = null;
  }
  
  // 确认礼物
  function confirmGift() {
    const senderName = document.getElementById('giftSenderName').value;
    const blessing = document.getElementById('giftBlessing').value;
    
    if (!blessing) {
      alert('请输入祝福语');
      return;
    }
    
    // 随机选择一个emoji
    const randomEmoji = fishTypes[Math.floor(Math.random() * fishTypes.length)];
    currentGiftEmoji = randomEmoji;
    
    // 显示确认界面
    const resultDiv = document.getElementById('giftResult');
    resultDiv.style.display = 'block';
    
    // 更新显示内容
    resultDiv.querySelector('div').innerHTML = `
      <div style="font-size:48px;margin-bottom:10px;">${randomEmoji}</div>
      <div style="font-size:14px;">礼物：${randomEmoji}</div>
      <div style="font-size:12px;opacity:0.8;margin:10px 0;">祝福：${blessing}</div>
    `;
    
    // 显示生成代码按钮
    document.getElementById('generateCodeBtn').style.display = 'block';
  }
  
  // 生成礼物代码
  function generateGiftCode() {
    const senderName = document.getElementById('giftSenderName').value;
    const blessing = document.getElementById('giftBlessing').value;
    
    // 使用确认时选择的emoji
    const emoji = currentGiftEmoji || fishTypes[Math.floor(Math.random() * fishTypes.length)];
    
    // 构建礼物数据
    const giftData = {
      emoji: emoji,
      sender: senderName || '神秘好友',
      blessing: blessing || '祝你养鱼开心！',
      timestamp: Date.now()
    };
    
    // 编码为 base64（UTF-8安全）
    const giftCode = btoa(encodeURIComponent(JSON.stringify(giftData)));
    
    // 显示生成的代码和复制按钮
    const codeDisplay = document.getElementById('giftCodeDisplay');
    codeDisplay.innerHTML = `<code>${giftCode}</code>`;
    codeDisplay.style.display = 'block';
    
    // 创建复制按钮
    const copyBtn = document.createElement('button');
    copyBtn.style.cssText = 'width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;cursor:pointer;font-size:14px;margin-top:10px;';
    copyBtn.textContent = '复制代码';
    copyBtn.onclick = () => {
      const copyText = '送你一个礼物，粘贴口令代码去领取吧~【' + giftCode + '】';
      navigator.clipboard.writeText(copyText).then(() => {
        copyBtn.textContent = '已复制！';
      }).catch(() => {
        alert('复制失败，请手动复制');
      });
    };
    
    // 清除旧的复制按钮
    const oldCopyBtn = codeDisplay.querySelector('button');
    if (oldCopyBtn) {
      oldCopyBtn.remove();
    }
    codeDisplay.appendChild(copyBtn);
    
    // 自动复制到剪贴板（带【】包裹格式）

  // 更新鱼的位置 - 更加自由随意的游动
  function updateFishPositions() {
    const tank = document.getElementById('tankWater');
    const tankWidth = tank.offsetWidth;
    const tankHeight = tank.offsetHeight;
    
    fishes.forEach(fish => {
      const fishEl = document.getElementById(fish.id);
      if (!fishEl) return;
      
      // 每100ms随机改变方向和速度，让游动更自然
      if (Math.random() < 0.2) {
        fish.dx += (Math.random() - 0.5) * 8; // 水平速度变化更大
        fish.dy += (Math.random() - 0.5) * 1; // 垂直速度变化很小
        
        // 限制最大速度：水平快，垂直慢
        const maxSpeedX = 25;
        const maxSpeedY = 5;
        fish.dx = Math.max(-maxSpeedX, Math.min(maxSpeedX, fish.dx));
        fish.dy = Math.max(-maxSpeedY, Math.min(maxSpeedY, fish.dy));
      }
      
      // 更新位置
      fish.x += fish.dx * 0.1; // 乘以0.1因为每100ms更新一次
      fish.y += fish.dy * 0.1;
      
      // 边界检测 - 碰到边界时水平翻转反方向移动
      if (fish.x <= 0) {
        fish.x = 0;
        fish.dx = Math.abs(fish.dx); // 水平翻转向右
      } else if (fish.x >= tankWidth - 40) {
        fish.x = tankWidth - 40;
        fish.dx = -Math.abs(fish.dx); // 水平翻转向左
      }
      
      if (fish.y <= 0) {
        fish.y = 0;
        fish.dy = Math.abs(fish.dy) + 1; // 向下
      } else if (fish.y >= tankHeight - 40) {
        fish.y = tankHeight - 40;
        fish.dy = -Math.abs(fish.dy) - 1; // 向上
      }
      
      fishEl.style.left = fish.x + 'px';
      fishEl.style.top = fish.y + 'px';
    });
  }

  // 喂鱼
  function feedFish() {
    stats.feedFishClicks++; // 记录点击喂鱼按钮
    checkAchievements(); // 检查成就
    if (!canFeedFish()) {
      saveFishToStorage();
      return;
    }
    
    const tank = document.getElementById('tankWater');
    const tankWidth = tank.offsetWidth;
    const tankHeight = tank.offsetHeight;
    lastFeedFishTime = Date.now();
    updateFeedFishButton();
    
    // 查找可以喂食的鱼（喂食次数 < 5）
    const feedableFish = fishes.filter(f => f.feedCount < 5);
    
    if (feedableFish.length === 0) {
      // 没有可喂食的鱼，鱼饵保留在原位不消失
      const food = document.createElement('div');
      food.className = 'fish';
      food.textContent = '🍎';
      food.style.left = '50%';
      food.style.top = '50%';
      food.style.fontSize = '20px';
      food.style.pointerEvents = 'none'; // 防止干扰
      tank.appendChild(food);
      return;
    }
    
    // 随机选择一条可喂食的鱼
    const targetFish = feedableFish[Math.floor(Math.random() * feedableFish.length)];
    const fishEl = document.getElementById(targetFish.id);
    
    // 计算鱼前方位置（根据鱼的移动方向）
    const distance = 60; // 鱼饵生成位置距离鱼的像素
    const dx = targetFish.dx || (Math.random() > 0.5 ? 1 : -1);
    const dy = targetFish.dy || (Math.random() - 0.5);
    const magnitude = Math.sqrt(dx * dx + dy * dy) || 1;
    const dirX = dx / magnitude;
    const dirY = dy / magnitude;
    
    // 鱼饵生成在鱼的前方
    let foodX = targetFish.x + dirX * distance;
    let foodY = targetFish.y + dirY * distance;
    
    // 确保鱼饵在鱼缸范围内
    foodX = Math.max(10, Math.min(tankWidth - 30, foodX));
    foodY = Math.max(10, Math.min(tankHeight - 30, foodY));
    
    // 创建鱼饵
    const food = document.createElement('div');
    food.className = 'fish';
    food.textContent = '🍎';
    food.style.left = foodX + 'px';
    food.style.top = foodY + 'px';
    food.style.fontSize = '20px';
    food.id = 'food-' + Date.now();
    
    tank.appendChild(food);
    
    if (fishEl) {
      // 1秒后鱼饵消失的同时鱼变大
      setTimeout(() => {
        // 鱼饵消失
        if (food.parentNode) {
          food.parentNode.removeChild(food);
        }
        // 鱼变大
        targetFish.feedCount++;
        const scale = 1 + targetFish.feedCount * 0.15; // 每次喂食变大15%
        fishEl.style.transform = `scale(${scale})`;
        saveFishToStorage();
        stats.successfulFeeds++; // 记录成功喂鱼次数
        checkAchievements(); // 检查成就
      }, 1000);
    }
  }
  
  // 清理鱼缸
  function cleanTank() {
    if (!confirm('确定要清理鱼缸吗？所有鱼、鱼饵和水草都会被清除！')) {
      return;
    }
    
    stats.cleanCount++; // 记录清理次数
    const tank = document.getElementById('tankWater');
    
    // 清理所有鱼
    fishes.forEach(fish => {
      const fishEl = document.getElementById(fish.id);
      if (fishEl) {
        fishEl.style.opacity = '0';
        setTimeout(() => {
          if (fishEl.parentNode) {
            fishEl.parentNode.removeChild(fishEl);
          }
        }, 300);
      }
    });
    fishes = [];
    
    // 清理所有鱼饵
    const foods = tank.querySelectorAll('[id^="food-"]');
    foods.forEach(food => {
      if (food.parentNode) {
        food.parentNode.removeChild(food);
      }
    });
    
    // 清理所有水草
    plants.forEach(plant => {
      const plantEl = document.getElementById(plant.id);
      if (plantEl && plantEl.parentNode) {
        plantEl.parentNode.removeChild(plantEl);
      }
    });
    plants = [];
    
    // 重置冷却时间
    lastAddFishTime = 0;
    lastFeedFishTime = 0;
    nextPlantGenerateTime = 0;
    
    updateFishCount();
    updateAddFishButton();
    updateFeedFishButton();
    saveFishToStorage();
  }

  // 保存鱼到localStorage
  function saveFishToStorage() {
    const fishData = fishes.map(f => ({ type: f.type, x: f.x, y: f.y, dx: f.dx, dy: f.dy, feedCount: f.feedCount || 0 }));
    const plantData = plants.map(p => ({ type: p.type, x: p.x, y: p.y }));
    const data = { fishes: fishData, plants: plantData, lastAddFishTime, lastFeedFishTime, achievements, nextPlantGenerateTime, stats };
    localStorage.setItem('fishTankData', JSON.stringify(data));
  }

  function loadFishFromStorage() {

    if (savedData) {
      const data = JSON.parse(savedData);
      const fishData = data.fishes || [];
      lastAddFishTime = data.lastAddFishTime || 0;
      lastFeedFishTime = data.lastFeedFishTime || 0;
      achievements = data.achievements || [];
      nextPlantGenerateTime = data.nextPlantGenerateTime || 0;
      stats = data.stats || { addFishClicks: 0, feedFishClicks: 0, successfulFeeds: 0, plantsCollected: 0, cleanCount: 0, petFishClicks: 0 };
      
      // 加载水草
      const plantData = data.plants || [];
      plantData.forEach(p => {
        const tank = document.getElementById('tankWater');
        const plant = document.createElement('div');
        plant.className = 'plant';
        plant.textContent = p.type;
        plant.style.left = p.x + 'px';
        plant.style.bottom = '10px';
        plant.style.fontSize = '24px';
        plant.style.position = 'absolute';
        plant.style.cursor = 'pointer';
        plant.id = 'plant-' + plantIdCounter++;
        plant.onclick = () => collectPlant(plant.id);
        tank.appendChild(plant);
        plants.push({ id: plant.id, type: p.type, x: p.x, y: p.y });
      });
      const tank = document.getElementById('tankWater');
      
      fishData.forEach(f => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.textContent = f.type;
        fish.style.left = f.x + 'px';
        fish.style.top = f.y + 'px';
        // 鱼的移动完全由JS控制，不再使用CSS动画
        fish.style.cursor = 'pointer';
        fish.id = 'fish-' + fishIdCounter++;
        fish.onclick = () => petFish(fish.id);
        
        // 恢复喂食次数和大小
        const feedCount = f.feedCount || 0;
        if (feedCount > 0) {
          const scale = 1 + feedCount * 0.15;
          fish.style.transform = `scale(${scale})`;
        }
        
        tank.appendChild(fish);
        fishes.push({ id: fish.id, type: f.type, x: f.x, y: f.y, dx: f.dx, dy: f.dy, feedCount });
      });
      
      updateFishCount();
    }
  }
  
  // 更新时间
  init();
</script>
</body>
</html>
