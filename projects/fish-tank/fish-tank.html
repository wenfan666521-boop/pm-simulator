<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摸鱼模拟器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script src="achievements.js"></script>
  <script src="events.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <div class="tank-header">
    <h1 class="tank-title" onclick="handleTitleClick()" id="tankTitle">🐠 我的鱼缸 <span id="tankCountBadge" style="font-size:12px;opacity:0.7;margin-left:8px;"></span> <span id="devHint" style="font-size:12px;opacity:0;"></span></h1>
    <button class="tank-btn" onclick="showMenu()" style="padding:8px 15px;font-size:12px;">☰ 菜单</button>
  </div>

  <div class="fish-tank" id="fishTank">
    <div class="tank-water" id="tankWater">
      <div class="fish-counter">鱼的数量: <span id="fishCount">0</span></div>
      <div class="feeding-hint" id="feedingHint" style="display:none;">🍽️ 点击鱼缸任意位置放置鱼饵</div>
    </div>
  </div>

  <div class="tank-controls">
    <button class="tank-btn" id="addFishBtn" onclick="addRandomFish()">➕ 添加鱼</button>
    <button class="tank-btn" id="feedFishBtn" onclick="feedFish()">🍽️ 喂鱼</button>
    <button class="tank-btn" onclick="showGiftPanel()">💫 祈祷</button>
    <button class="tank-btn" onclick="showReceivePanel()">📬 收礼</button>
  </div>
</div>

<script src="storage.js"></script>
<script src="fish-feeding.js"></script>
<script src="gift-system.js"></script>
<script src="events-system.js"></script>
<script src="logic.js"></script>
</body>
</html>
