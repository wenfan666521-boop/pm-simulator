<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小克鱼模块 · 测试页</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 20px; color: #667eea; }
    h2 { font-size: 14px; color: #aaa; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .test-section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .btn { display: inline-block; padding: 8px 14px; border: none; border-radius: 8px; background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; cursor: pointer; font-size: 13px; margin: 4px; }
    .btn:hover { opacity: 0.85; }
    .btn.danger { background: linear-gradient(135deg,#ff6b6b,#ee5a5a); }
    .btn.success { background: linear-gradient(135deg,#34c759,#28a745); }
    .btn.warning { background: linear-gradient(135deg,#f093fb,#f5576c); }
    .log { background: #0d0d1a; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 200px; overflow-y: auto; margin-top: 10px; color: #aaa; white-space: pre-wrap; word-break: break-all; }
    .log .info { color: #4a9eff; }
    .log .success { color: #34c759; }
    .log .error { color: #ff6b6b; }
    .log .warn { color: #f093fb; }
    .log-line { margin-bottom: 4px; }
    .input-row { display: flex; gap: 8px; margin-top: 8px; }
    input[type="text"] { flex: 1; padding: 8px 12px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: #fff; font-size: 13px; outline: none; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: rgba(255,255,255,0.1); margin-left: 8px; }
    .status-badge.on { background: rgba(52,199,89,0.3); color: #34c759; }
    .status-badge.off { background: rgba(255,107,107,0.3); color: #ff6b6b; }
    .code-display { background: #0d0d1a; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 11px; color: #4a9eff; word-break: break-all; margin-top: 8px; display: none; }
    .code-display.visible { display: block; }
    .info-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 13px; }
    .info-row span { color: #aaa; }
    .info-row strong { color: #fff; }
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
    .toggle-label { font-size: 13px; }
    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
  </style>
</head>
<body>

<h1>🐱 小克鱼模块 · 测试页</h1>

<!-- 环境切换 -->
<div class="test-section">
  <div class="toggle-row">
    <label>
      <input type="checkbox" id="devModeToggle" checked>
      <span class="toggle-label">开发模式（独立存储）</span>
    </label>
    <span class="status-badge on" id="devModeStatus">ON</span>
  </div>
  <div class="info-row">
    <span>当前种子码：</span>
    <strong id="currentSeedCode">KLE-FISH-SEED-DEV</strong>
  </div>
</div>

<!-- 数据层测试 -->
<h2>kle-data.js · 数据层</h2>
<div class="test-section">
  <div>
    <button class="btn" onclick="test_saveKleFish()">写入小克鱼实例</button>
    <button class="btn" onclick="test_loadKleFish()">读取小克鱼实例</button>
    <button class="btn danger" onclick="test_deleteKleFish()">删除小克鱼实例</button>
  </div>
  <div class="input-row">
    <input type="text" id="lsKey" placeholder="localStorage key" style="max-width:200px">
    <input type="text" id="lsValue" placeholder="value（JSON字符串）" style="flex:2">
    <button class="btn" onclick="test_saveLS()">写入LS</button>
    <button class="btn" onclick="test_loadLS()">读取LS</button>
    <button class="btn danger" onclick="test_clearLS()">清除LS</button>
  </div>
  <div class="log" id="log-data"></div>
</div>

<!-- 兑换系统测试 -->
<h2>kle-share.js · 兑换系统</h2>
<div class="test-section">
  <div class="input-row">
    <input type="text" id="exchangeCodeInput" placeholder="输入兑换码" style="flex:2">
    <button class="btn success" onclick="test_exchangeSeedCode()">兑换种子码</button>
    <button class="btn" onclick="test_exchangeSpecialCode()">兑换特殊码</button>
  </div>
  <div class="code-display" id="shareCodeDisplay"></div>
  <div>
    <button class="btn" onclick="test_generateShareCode()">生成特殊分享码</button>
    <button class="btn" onclick="test_checkCanGenerate()">检查生成资格</button>
  </div>
  <div class="log" id="log-share"></div>
</div>

<!-- 账户状态 -->
<h2>账户状态总览</h2>
<div class="test-section">
  <button class="btn" onclick="refreshAccountStatus()">刷新状态</button>
  <div id="accountStatusDisplay" style="margin-top:10px;font-size:13px;"></div>
</div>

<!-- 完整流程测试 -->
<h2>完整流程测试</h2>
<div class="test-section">
  <button class="btn warning" onclick="test_fullFlow()">执行完整流程（兑换 → 读取 → 生成码 → 清除）</button>
  <div class="log" id="log-fullflow"></div>
</div>

<!-- 清除所有 -->
<h2>重置</h2>
<div class="test-section">
  <button class="btn danger" onclick="test_clearAll()">清除所有测试数据</button>
</div>

<!-- 依赖说明 -->
<h2>依赖说明</h2>
<div class="test-section" style="font-size:13px;color:#aaa;line-height:1.8;">
  本测试页依赖以下文件（需确保在同目录或通过 HTTP 服务访问）：<br>
  - lz-string.min.js（压缩/解压）<br>
  - kle-fish/kle-config.js<br>
  - kle-fish/kle-data.js<br>
  - kle-fish/kle-share.js<br>
  <br>
 ⚠️ 本页使用独立 DB（kleFish_dev），不影响正式数据。
</div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="kle-fish/kle-config.js"></script>
<script src="kle-fish/kle-data.js"></script>
<script src="kle-fish/kle-share.js"></script>

<script>
  // ========== 工具函数 ==========
  function log(containerId, msg, type) {
    type = type || 'info';
    const el = document.getElementById(containerId);
    const line = document.createElement('div');
    line.className = 'log-line ' + type;
    line.textContent = '[' + new Date().toLocaleTimeString('zh-CN') + '] ' + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function clearLog(containerId) {
    document.getElementById(containerId).innerHTML = '';
  }

  function updateDevModeStatus() {
    const on = document.getElementById('devModeToggle').checked;
    KLE_CONFIG.devMode = on;
    document.getElementById('devModeStatus').textContent = on ? 'ON' : 'OFF';
    document.getElementById('devModeStatus').className = 'status-badge ' + (on ? 'on' : 'off');
    document.getElementById('currentSeedCode').textContent = on ? 'KLE-FISH-SEED-DEV' : 'KLE-FISH-SEED';
  }

  document.getElementById('devModeToggle').addEventListener('change', updateDevModeStatus);
  updateDevModeStatus();

  // ========== 数据层测试 ==========
  function test_saveKleFish() {
    clearLog('log-data');
    const fishData = {
      id: 'fish-kle-test-' + Date.now(),
      type: '🐱',
      x: 150,
      y: 120,
      isKleFish: true,
      receivedAt: Date.now(),
      generatedBy: null,
      ancestors: []
    };
    window.kleData.saveKleFish(fishData).then(() => {
      log('log-data', '小克鱼实例已写入: ' + JSON.stringify(fishData), 'success');
    }).catch(e => log('log-data', '写入失败: ' + e, 'error'));
  }

  function test_loadKleFish() {
    clearLog('log-data');
    window.kleData.loadKleFish().then(fish => {
      if (fish) {
        log('log-data', '读取到小克鱼: ' + JSON.stringify(fish), 'success');
      } else {
        log('log-data', 'IndexedDB 中无小克鱼实例', 'warn');
      }
    }).catch(e => log('log-data', '读取失败: ' + e, 'error'));
  }

  function test_deleteKleFish() {
    clearLog('log-data');
    window.kleData.deleteKleFish().then(() => {
      log('log-data', '小克鱼实例已删除', 'success');
    }).catch(e => log('log-data', '删除失败: ' + e, 'error'));
  }

  function test_saveLS() {
    const key = document.getElementById('lsKey').value;
    const val = document.getElementById('lsValue').value;
    if (!key) { log('log-data', '请输入 key', 'error'); return; }
    try {
      const parsed = val ? JSON.parse(val) : null;
      if (parsed) {
        window.kleData.saveAccountData(parsed);
        log('log-data', '已写入 localStorage: ' + key + ' = ' + val, 'success');
      } else {
        localStorage.setItem(key, val);
        log('log-data', '已写入 localStorage: ' + key + ' = ' + val, 'success');
      }
    } catch(e) {
      localStorage.setItem(key, val);
      log('log-data', '已写入 localStorage: ' + key + ' = ' + val, 'success');
    }
  }

  function test_loadLS() {
    const key = document.getElementById('lsKey').value;
    if (!key) { log('log-data', '请输入 key', 'error'); return; }
    const val = localStorage.getItem(key);
    log('log-data', '读取 localStorage: ' + key + ' = ' + (val || '(空)'), val ? 'info' : 'warn');
  }

  function test_clearLS() {
    const key = document.getElementById('lsKey').value;
    if (!key) { log('log-data', '请输入 key', 'error'); return; }
    localStorage.removeItem(key);
    log('log-data', '已清除 localStorage: ' + key, 'success');
  }

  // ========== 兑换系统测试 ==========
  function test_exchangeSeedCode() {
    clearLog('log-share');
    const code = document.getElementById('exchangeCodeInput').value.trim() || (KLE_CONFIG.devMode ? KLE_CONFIG.SEED_CODE_DEV : KLE_CONFIG.SEED_CODE);
    log('log-share', '尝试兑换种子码: ' + code, 'info');
    const result = window.kleShare.exchangeSeedCode(code, 'test-user-001');
    if (result.success) {
      log('log-share', '兑换成功！鱼数据: ' + JSON.stringify(result.fishData), 'success');
    } else {
      const errorMsg = {
        'INVALID_CODE': '无效的兑换码',
        'ALREADY_HOLDER': '已有小克鱼体验资格'
      }[result.error] || result.error;
      log('log-share', '兑换失败: ' + errorMsg, 'error');
    }
  }

  function test_exchangeSpecialCode() {
    clearLog('log-share');
    const code = document.getElementById('exchangeCodeInput').value.trim();
    if (!code) { log('log-share', '请先输入特殊码', 'error'); return; }
    const result = window.kleShare.exchangeSpecialCode(code, 'test-user-002');
    if (result.success) {
      log('log-share', '特殊码兑换成功！鱼数据: ' + JSON.stringify(result.fishData), 'success');
    } else {
      const errorMsg = {
        'NOT_KLE_CODE': '非小克鱼专属码',
        'CODE_ALREADY_USED': '码已被使用',
        'ALREADY_HOLDER': '已有小克鱼体验资格'
      }[result.error] || result.error;
      log('log-share', '兑换失败: ' + errorMsg, 'error');
    }
  }

  function test_generateShareCode() {
    clearLog('log-share');
    const result = window.kleShare.generateShareCode('test-user-001');
    if (result.success) {
      log('log-share', '特殊码生成成功！', 'success');
      const display = document.getElementById('shareCodeDisplay');
      display.textContent = result.code;
      display.classList.add('visible');
    } else {
      const errorMsg = {
        'CANNOT_GENERATE': '无生成资格（需完成三天故事）'
      }[result.error] || result.error;
      log('log-share', '生成失败: ' + errorMsg, 'error');
    }
  }

  function test_checkCanGenerate() {
    const can = window.kleData.canGenerateCode();
    log('log-share', '生成资格: ' + (can ? '有 ✅' : '无 ❌'), can ? 'success' : 'warn');
  }

  // ========== 账户状态 ==========
  function refreshAccountStatus() {
    const data = window.kleData.loadAccountData();
    const display = document.getElementById('accountStatusDisplay');
    display.innerHTML = `
      <div class="info-row"><span>isKleHolder</span><strong>${data.isKleHolder}</strong></div>
      <div class="info-row"><span>canGenerateKleCode</span><strong>${data.canGenerateKleCode}</strong></div>
      <div class="info-row"><span>progress</span><strong>${data.progress}</strong></div>
      <div class="info-row"><span>currentDay</span><strong>${data.currentDay}</strong></div>
      <div class="info-row"><span>completed</span><strong>${data.completed}</strong></div>
      <div class="info-row"><span>generatedBy</span><strong>${data.generatedBy || '(null)'}</strong></div>
      <div class="info-row"><span>ancestors</span><strong>${JSON.stringify(data.ancestors)}</strong></div>
      <div class="info-row"><span>items</span><strong>${JSON.stringify(data.items)}</strong></div>
      <div style="margin-top:10px;font-size:12px;color:#666;">任务状态：</div>
      <div class="info-row"><span>DAY1 pendulum</span><strong>${data.tasks.day1.pendulum}</strong></div>
      <div class="info-row"><span>DAY1 coin</span><strong>${data.tasks.day1.coin}</strong></div>
      <div class="info-row"><span>DAY1 divination</span><strong>${data.tasks.day1.divination}</strong></div>
      <div class="info-row"><span>DAY2 door</span><strong>${data.tasks.day2.door}</strong></div>
      <div class="info-row"><span>DAY2 clock</span><strong>${data.tasks.day2.clock}</strong></div>
      <div class="info-row"><span>DAY2 fur</span><strong>${data.tasks.day2.fur}</strong></div>
      <div class="info-row"><span>DAY2 tea</span><strong>${data.tasks.day2.tea}</strong></div>
      <div class="info-row"><span>DAY3 ritual</span><strong>${data.tasks.day3.ritual}</strong></div>
    `;
  }

  // ========== 完整流程 ==========
  function test_fullFlow() {
    clearLog('log-fullflow');
    log('log-fullflow', '=== 开始完整流程测试 ===', 'info');

    // Step 1: 清除旧数据
    window.kleData.clearAllTestData().then(() => {
      log('log-fullflow', 'Step 1: 测试数据已清除', 'success');
      // Step 2: 兑换种子码
      const seedResult = window.kleShare.exchangeSeedCode(KLE_CONFIG.SEED_CODE_DEV, 'test-user-001');
      if (!seedResult.success) {
        log('log-fullflow', 'Step 2: 兑换失败 - ' + seedResult.error, 'error');
        return;
      }
      log('log-fullflow', 'Step 2: 种子码兑换成功！', 'success');

      // Step 3: 读取小克鱼
      return window.kleData.loadKleFish();
    }).then(fish => {
      if (fish) log('log-fullflow', 'Step 3: 小克鱼已写入 IndexedDB: ' + fish.id, 'success');
      // Step 4:刷新状态
      refreshAccountStatus();
      log('log-fullflow', 'Step 4: 账户状态已刷新', 'success');
      // Step 5:尝试生成码（应失败，因为没完成故事）
      const genResult = window.kleShare.generateShareCode('test-user-001');
      if (!genResult.success) {
        log('log-fullflow', 'Step 5: 生成码被正确拦截（需完成故事）: ' + genResult.error, 'success');
      } else {
        log('log-fullflow', 'Step 5: 生成码成功（意外！）', 'warn');
      }
      log('log-fullflow', '=== 完整流程测试完成 ===', 'success');
    }).catch(e => {
      log('log-fullflow', '流程异常: ' + e, 'error');
    });
  }

  // ========== 重置 ==========
  function test_clearAll() {
    if (!confirm('确定要清除所有测试数据吗？')) return;
    window.kleData.clearAllTestData().then(() => {
      refreshAccountStatus();
      log('log-data', '所有测试数据已清除', 'success');
      log('log-share', '所有测试数据已清除', 'success');
    });
  }

  // 初始刷新
  refreshAccountStatus();
</script>

</body>
</html>
