<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小星工作室</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;background:#000;height:100vh;display:flex;justify-content:center;align-items:center}
    .phone{width:390px;height:844px;background:#000;border-radius:44px;box-shadow:0 0 60px rgba(255,255,255,.08),0 0 0 8px #2c2c2e;overflow:hidden;display:flex;flex-direction:column;position:relative;background:url('./assets/wallpaper.jpg') no-repeat center center;background-size:cover}
    .status-bar{height:48px;background:transparent;display:flex;justify-content:space-between;align-items:center;padding:0 28px;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;position:relative;z-index:10}
    .status-bar .time{font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.5)}
    .home-content{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:12px 18px 90px;position:relative;z-index:10;background:linear-gradient(180deg,rgba(0,0,0,.3) 0%,rgba(0,0,0,.6) 20%,rgba(0,0,0,.4) 100%)}
    .date-label{font-size:22px;font-weight:700;color:#fff;padding:10px 6px 24px;text-shadow:0 2px 6px rgba(0,0,0,.5)}
    .apps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px 16px;padding:0 4px}
    .app-icon{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
    .app-icon .icon-img{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
    .app-icon .icon-emoji{font-size:28px}
    .app-icon .app-name{font-size:10px;color:#fff;text-align:center;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.6)}
    .app-icon.add .icon-img{border:2px dashed rgba(255,255,255,.4);border-radius:14px;background:rgba(0,0,0,.3);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
    .app-icon.add .icon-img .plus{font-size:28px;color:rgba(255,255,255,.4)}
    .app-icon .app-name.add-name{color:rgba(255,255,255,.4)}
    .dock{height:88px;background:rgba(255,255,255,.1);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);display:flex;justify-content:center;align-items:center;gap:40px;flex-shrink:0;position:relative;z-index:10;border-top:1px solid rgba(255,255,255,.15)}
    .dock-icon{width:54px;height:54px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 3px 10px rgba(0,0,0,.35)}
    .page-content{display:none;flex-direction:column;height:100%}
    .page-content.active{display:flex}
    iframe.fullpage{flex:1;border:none;display:block;background:#fff;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch}
    .float-home{position:absolute;bottom:20px;left:14px;width:40px;height:40px;background:rgba(0,0,0,.6);backdrop-filter:blur(20px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  </style>
</head>
<body>
<div class="phone" id="app">
  <!-- 状态栏 -->
  <div class="status-bar">
    <span class="time" id="statusTime">09:00</span>
    <span>🔋 100% &nbsp;📶</span>
  </div>

  <!-- 主页面：桌面 -->
  <div class="page-content active" id="pageHome">
    <div class="home-content">
      <div class="date-label" id="dateLabel">星期二 · 4月27日</div>
      <div class="apps-grid" id="appsGrid">
        <!-- 应用图标由JS生成 -->
      </div>
    </div>
    <!-- Dock栏 -->
    <div class="dock">
      <div class="dock-icon" style="background:rgba(0,122,255,.8);font-size:24px;">💬</div>
      <div class="dock-icon" style="background:rgba(80,80,80,.8);font-size:24px;">👤</div>
      <div class="dock-icon" style="background:rgba(80,80,80,.8);font-size:24px;">📷</div>
      <div class="dock-icon" style="background:rgba(80,80,80,.8);font-size:24px;">⚙️</div>
    </div>
  </div>

  <!-- 子页面：iframe内嵌项目 -->
  <div class="page-content" id="pageFrame">
    <div class="float-home" onclick="backToHome()"><svg t="1777258652652" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="16022" width="22" height="22"><path d="M864.4608 298.0864L583.68 77.7728a115.8144 115.8144 0 0 0-142.848 0l-281.0368 220.16A170.3424 170.3424 0 0 0 94.3616 432.128v379.4432A140.6976 140.6976 0 0 0 235.0592 952.32H332.8a51.2 51.2 0 0 0 51.2-51.2v-135.5264a51.2 51.2 0 0 1 51.2-51.2h153.6a51.2 51.2 0 0 1 51.2 51.2V901.12a51.2 51.2 0 0 0 51.2 51.2h97.8944c77.7728 0 140.7488-63.0272 140.7488-130.5088V442.368c-0.2048-62.5664-24.2176-111.9744-65.3824-144.2816z" fill="#CCDAFF" p-id="16023"></path><path d="M368.1792 462.1312m47.9744 0l191.6416 0q47.9744 0 47.9744 47.9744l0 0q0 47.9744-47.9744 47.9744l-191.6416 0q-47.9744 0-47.9744-47.9744l0 0q0-47.9744 47.9744-47.9744Z" fill="#7A7AF9" p-id="16024"></path></svg></div>
    <iframe class="fullpage" id="framePage" src=""></iframe>
  </div>
</div>

<script>
  // 应用配置 — 在这里添加新项目
  const APPS = [
    {
      name: '产品经理模拟器',
      emoji: '🎮',
      bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      link: 'pm-simulator/index.html'
    },
    {
      name: '摸鱼模拟器',
      emoji: '🐟',
      bg: 'linear-gradient(135deg, #0066cc 0%, #004499 100%)',
      link: 'fish-tank.html'
    },
    {
      name: '添加项目',
      emoji: null,
      bg: null,
      isAdd: true,
      link: null
    }
  ];

  function renderApps() {
    const grid = document.getElementById('appsGrid');
    grid.innerHTML = '';
    APPS.forEach(app => {
      const el = document.createElement('div');
      el.className = 'app-icon' + (app.isAdd ? ' add' : '');
      if (app.isAdd) {
        el.innerHTML = `
          <div class="icon-img">
            <span class="plus">+</span>
          </div>
          <span class="app-name add-name">${app.name}</span>
        `;
      } else {
        el.innerHTML = `
          <div class="icon-img" style="background:${app.bg}">
            <span class="icon-emoji">${app.emoji}</span>
          </div>
          <span class="app-name">${app.name}</span>
        `;
        el.onclick = () => openApp(app);
      }
      grid.appendChild(el);
    });
  }

  function openApp(app) {
    if (!app.link) return;
    document.getElementById('framePage').src = app.link;
    document.getElementById('pageHome').classList.remove('active');
    document.getElementById('pageFrame').classList.add('active');
  }

  function backToHome() {
    document.getElementById('framePage').src = '';
    document.getElementById('pageFrame').classList.remove('active');
    document.getElementById('pageHome').classList.add('active');
  }

  function updateTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('statusTime').textContent = `${h}:${m}`;
    const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    const mo = now.getMonth() + 1;
    const d = now.getDate();
    document.getElementById('dateLabel').textContent = `${days[now.getDay()]} · ${mo}月${d}日`;
  }

  renderApps();
  updateTime();
  setInterval(updateTime, 1000);
</script>
</body>
</html>
