<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>产品经理模拟器</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;background:#ededed;height:100vh;display:flex;justify-content:center;align-items:center}
    .phone{width:390px;height:844px;background:#fff;border-radius:44px;box-shadow:0 0 40px rgba(0,0,0,.15),0 0 0 8px #3a3a3c;overflow:hidden;display:flex;flex-direction:column;position:relative}
    .status-bar{height:48px;background:#ededed;display:flex;justify-content:space-between;align-items:center;padding:0 24px;font-size:12px;font-weight:600;color:#1c1c1e;flex-shrink:0}
    .status-bar .time{font-weight:700}
    .wechat-nav{height:56px;background:#ededed;display:flex;justify-content:space-between;align-items:center;padding:0 16px;border-bottom:.5px solid #d1d1d6;flex-shrink:0}
    .wechat-nav .back{font-size:22px;cursor:pointer;color:#007aff;line-height:1}
    .wechat-nav .back.hidden{visibility:hidden}
    .wechat-nav .title{font-size:17px;font-weight:600;color:#1c1c1e}
    .scene{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .scene.hidden{display:none}
    #conversation-list{background:#fff;flex:1;overflow-y:auto}
    .conv-item{display:flex;align-items:center;padding:12px 16px;border-bottom:.5px solid #e9e9eb;cursor:pointer;transition:background .15s}
    .conv-item:active{background:#e9e9eb}
    .conv-avatar{width:48px;height:48px;border-radius:6px;margin-right:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
    .conv-info{flex:1;min-width:0}
    .conv-name{font-size:16px;font-weight:500;color:#1c1c1e;display:flex;align-items:center;gap:6px}
    .conv-preview{font-size:13px;color:#8e8e93;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-meta{text-align:right;flex-shrink:0}
    .conv-time{font-size:11px;color:#8e8e93}
    .badge{background:#ff3b30;color:#fff;font-size:11px;font-weight:600;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-top:4px;padding:0 5px}
    .badge.hidden{display:none}
    #chat-room{flex:1;display:flex;flex-direction:column;background:#ededed}
    #chat-room.hidden{display:none}
    .chat-header{height:56px;background:#ededed;display:flex;align-items:center;padding:0 16px;border-bottom:.5px solid #d1d1d6;flex-shrink:0}
    .chat-header .back{font-size:22px;cursor:pointer;color:#007aff;margin-right:12px}
    .chat-header .avatar{width:34px;height:34px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px}
    .chat-header .name{font-size:17px;font-weight:600}
    .msg-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
    .msg-list::-webkit-scrollbar{width:0}
    .msg-wrapper{display:flex;align-items:flex-start;max-width:82%}
    .msg-theirs .msg-avatar{width:34px;height:34px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-right:8px;flex-shrink:0}
    .msg-theirs{align-self:flex-start}
    .msg-mine{align-self:flex-end;flex-direction:row-reverse}
    .msg-bubble{padding:8px 12px;border-radius:8px;font-size:15px;line-height:1.5;max-width:100%;word-break:break-word;position:relative}
    .msg-theirs .msg-bubble{background:#fff;color:#1c1c1e;border-top-left-radius:2px}
    .msg-mine .msg-bubble{background:#95ec69;color:#1c1c1e;border-top-right-radius:2px}
    .msg-time{font-size:10px;color:#8e8e93;margin-top:3px;text-align:right}
    .msg-sep{text-align:center;font-size:11px;color:#c7c7cc;padding:8px 0;position:relative}
    .msg-sep::before,.msg-sep::after{content:'';position:absolute;top:50%;width:40%;height:.5px;background:#d1d1d6}
    .msg-sep::before{left:8px}
    .msg-sep::after{right:8px}
    .chat-room-nav{height:56px;background:#ededed;display:flex;align-items:center;padding:0 16px;border-bottom:.5px solid #d1d1d6;flex-shrink:0}
    .chat-room-nav .back{font-size:22px;cursor:pointer;color:#007aff;margin-right:12px}
    .chat-room-nav .avatar{width:34px;height:34px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px}
    .chat-room-nav .name{font-size:17px;font-weight:600}
    .choice-area{padding:10px 16px 16px;background:#ededed;border-top:.5px solid #d1d1d6;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
    .choice-btn{padding:10px 14px;border-radius:8px;background:#fff;border:.5px solid #d1d1d6;font-size:14px;color:#007aff;cursor:pointer;text-align:left;transition:background .15s}
    .choice-btn:active{background:#e9e9eb}
    .choice-btn:disabled{opacity:.4;cursor:not-allowed}
    .typing-indicator{align-self:flex-start;display:flex;align-items:center;gap:4px;padding:10px 14px;background:#fff;border-radius:8px;border-top-left-radius:2px}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:#8e8e93;animation:typingBounce 1.2s infinite ease-in-out}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
    /* 微信遮罩层 */
    .wx-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;text-align:center;padding:32px}
    .wx-overlay .icon{font-size:64px;margin-bottom:20px}
    .wx-overlay h2{font-size:20px;font-weight:600;margin-bottom:12px}
    .wx-overlay p{font-size:15px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:24px}
    .wx-overlay .btn-open{padding:12px 36px;border-radius:24px;background:#07c160;color:#fff;border:none;font-size:16px;font-weight:600;cursor:pointer}
    .wx-overlay .btn-open:active{background:#06ad56}
    .wx-overlay .hint{font-size:12px;color:rgba(255,255,255,.4);margin-top:24px}
    .wx-overlay.hidden{display:none}
  </style>
</head>
<body>
<!-- 微信遮罩层HTML -->
<div class="wx-overlay" id="wxOverlay">
  <div class="icon">🔗</div>
  <h2>请在浏览器中打开</h2>
  <p>当前页面在微信内无法完美运行，<br>用浏览器打开体验更佳哦</p>
  <button class="btn-open" id="wxOpenBtn">在微信中打开</button>
  <p class="hint">· 点击右上角「…」→「在浏览器中打开」<br>· 或复制链接到浏览器访问</p>
</div>

<div class="phone" id="app">
  <div class="status-bar"><span class="time" id="statusTime">21:46</span><span>🔋 100%</span></div>
  <div class="wechat-nav" id="listNav"><span class="back hidden">‹</span><span class="title">微信</span><span class="actions">➕</span></div>
  <div id="conversation-list" class="scene"></div>
  <div id="chat-room" class="scene hidden">
    <div class="chat-room-nav" id="chatNav">
      <span class="back" id="chatBackBtn" onclick="backToList()">‹</span>
      <div class="avatar" id="chatAvatar">👤</div>
      <span class="name" id="chatName">联系人</span>
    </div>
    <div class="msg-list" id="msgList"></div>
    <div class="choice-area" id="choiceArea"></div>
  </div>
</div>

<script>
// 微信浏览器检测 + 遮罩控制
(function(){
  var ua = navigator.userAgent.toLowerCase();
  var isWx = ua.indexOf('micromessenger') !== -1;
  var overlay = document.getElementById('wxOverlay');
  if (isWx) {
    overlay.classList.remove('hidden');
    document.getElementById('wxOpenBtn').onclick = function(){
      overlay.innerHTML = '<div class="icon">ℹ️</div><h2>请在浏览器中打开</h2><p>点击右上角「…」→「在浏览器中打开」<br>或复制链接到系统浏览器访问</p><button class="btn-open" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);cursor:pointer;padding:12px 36px;border-radius:24px;font-size:16px;font-weight:600;margin-top:20px;" onclick="location.reload()">返回</button>';
    };
  } else {
    overlay.classList.add('hidden');
  }
})();

const CHARACTERS = {

const ENDINGS = {

// === 状态 ===
const state = {
  trust: { zhou:50, xiao:50, xiaoxiao:50, wang:50, fei:50, ke:50 },
  progress: 0,
  line: null,
  flags: {},
  done: {},     // { intro:true, xiao1:true, ... }
  msgs: {},     // { zhou: [msg obj, ...], xiao: [...], ... } 累积的对话记录
  currentChar: null,
  currentDlgIdx: null,
  choiceLock: false,
  dlgProgress: {},  // { intro:2, xiao1:1, ... } 追踪每个对话已展示到第几条消息
};
// 预填充每个角色的空消息数组
Object.keys(CHARACTERS).forEach(k => { state.msgs[k] = []; });

// === 辅助 ===
function initState() {
  Object.assign(state, {
    trust: { zhou:50, xiao:50, xiaoxiao:50, wang:50, fei:50, ke:50 },
    progress: 0, line: null, flags: {}, done: {}, choiceLock: false, currentChar: null, currentDlgIdx: null,
  });
  Object.keys(CHARACTERS).forEach(k => { state.msgs[k] = []; });
  state.dlgProgress = {};
}

function findNextDialogue(charKey) {
  // 找到该角色下一个未完成的对话
  const charDlgs = DIALOGUES.filter(d => d.char === charKey);
  for (const dlg of charDlgs) {
    if (!state.done[dlg.id]) return dlg;
  }
  return null;
}

function getUnreadCount(charKey) {
  const charDlgs = DIALOGUES.filter(d => d.char === charKey);
  let unread = 0;
  for (const dlg of charDlgs) {
    if (!state.done[dlg.id]) {
      // 检查是否已解锁（final需要等其他人做完）
      if (dlg.id === 'final') {
        const allBefore = ['intro','xiao1','xiaoxiao1','qiang1','fei1','ke1'].every(id => state.done[id]);
        if (allBefore) unread++;
      } else {
        unread++;
      }
    }
  }
  return unread;
}

// 决定哪些角色在列表中可见
function getVisibleChars() {
  // 开场只有周姐可见
  let visible = ['zhou'];
  if (state.done['intro']) visible.push('xiao');
  if (state.done['xiao1']) visible.push('xiaoxiao');
  if (state.done['xiaoxiao1']) visible.push('wang');
  if (state.done['qiang1']) visible.push('fei');
  if (state.done['fei1']) visible.push('ke');
  // 全做完后开最终抉择
  const allBeforeFinal = ['intro','xiao1','xiaoxiao1','qiang1','fei1','ke1'].every(id => state.done[id]);
  if (allBeforeFinal && !state.done['final']) visible.push('zhou');
  return [...new Set(visible)];
}

function getLastMsgPreview(charKey) {
  const msgs = state.msgs[charKey];
  if (msgs.length === 0) return '暂无消息';
  // 找最后一条回复
  for (let i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].who === 'them') return msgs[i].text.slice(0, 20) + (msgs[i].text.length > 20 ? '…' : '');
  }
  return '已读';
}

// === 渲染 ===
function renderTime() {
  const n = new Date();
  document.getElementById('statusTime').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
renderTime(); setInterval(renderTime, 30000);

function renderConversations() {
  const list = document.getElementById('conversation-list');
  list.innerHTML = '';
  const visible = getVisibleChars();

  visible.forEach(charKey => {
    const c = CHARACTERS[charKey];
    const unread = getUnreadCount(charKey);
    const hasFinal = charKey === 'zhou' && !state.done['final'] &&
      ['intro','xiao1','xiaoxiao1','qiang1','fei1','ke1'].every(id => state.done[id]);
    const preview = getLastMsgPreview(charKey);
    const item = document.createElement('div');
    item.className = 'conv-item';
    item.innerHTML = `
      <div class="conv-avatar" style="background:${c.color}22">${c.emoji}</div>
      <div class="conv-info">
        <div class="conv-name">${c.name} ${hasFinal ? '<span style="font-size:11px;background:#ff3b30;color:#fff;border-radius:4px;padding:1px 5px;">⚡</span>' : ''}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">现在</div>
        <div class="badge ${unread > 0 ? '' : 'hidden'}">${unread}</div>
      </div>`;
    item.onclick = () => openChar(charKey);
    list.appendChild(item);
  });
}

function openChar(charKey) {
  state.currentChar = charKey;
  const c = CHARACTERS[charKey];

  document.getElementById('conversation-list').classList.add('hidden');
  document.getElementById('chat-room').classList.remove('hidden');
  document.getElementById('listNav').classList.add('hidden');
  document.getElementById('chatNav').classList.remove('hidden');

  document.getElementById('chatAvatar').textContent = c.emoji;
  document.getElementById('chatAvatar').style.background = c.color + '22';
  document.getElementById('chatName').textContent = c.name;

  renderMessages();
}

function backToList() {
  document.getElementById('conversation-list').classList.remove('hidden');
  document.getElementById('chat-room').classList.add('hidden');
  document.getElementById('listNav').classList.remove('hidden');
  document.getElementById('chatNav').classList.add('hidden');
  state.currentChar = null;
  state.choiceLock = false;
  renderConversations();
}

function enableBackBtn(ok) {
  const btn = document.getElementById('chatBackBtn');
  if (ok) {
    btn.style.pointerEvents = 'auto';
    btn.style.color = '#007aff';
  } else {
    btn.style.pointerEvents = 'none';
    btn.style.color = '#c7c7cc';
  }
}

function renderMessages() {
  const list = document.getElementById('msgList');
  const choiceArea = document.getElementById('choiceArea');
  list.innerHTML = '';
  state.choiceLock = false;

  const charKey = state.currentChar;
  const c = CHARACTERS[charKey];

  // 1. 渲染已完成的对话消息（从 state.msgs 中读取）
  const allMsgs = state.msgs[charKey] || [];
  allMsgs.forEach(m => {
    addBubble(list, m.who === 'them' ? 'them' : 'mine', m.text, c);
  });

  // 2. 找下一个未完成的对话轮次
  const nextDlg = findNextDialogue(charKey);
  if (!nextDlg || state.done['final']) {
    choiceArea.innerHTML = '<div style="text-align:center;color:#8e8e93;font-size:13px;padding:8px;">— 暂无新消息 —</div>';
    scrollBottom(list);
    return;
  }

  if (nextDlg.id === 'final') {
    const allDone = ['intro','xiao1','xiaoxiao1','qiang1','fei1','ke1'].every(id => state.done[id]);
    if (!allDone) {
      choiceArea.innerHTML = '<div style="text-align:center;color:#8e8e93;font-size:13px;padding:8px;">— 等待其他角色回复 —</div>';
      scrollBottom(list);
      return;
    }
  }

  // 进入对话后锁定返回按钮（直到选项出现）
  enableBackBtn(false);

  // 3. 从 dlgProgress 恢复播放进度
  if (!state.dlgProgress[nextDlg.id]) state.dlgProgress[nextDlg.id] = 0;
  let msgIdx = state.dlgProgress[nextDlg.id];
  let isRestoring = msgIdx > 0; // 正在恢复之前播过的消息

  if (msgIdx === 0) {
    const sep = document.createElement('div');
    sep.className = 'msg-sep';
    sep.textContent = getTimeStr();
    list.appendChild(sep);
  }

  function showNextMsg() {
    if (msgIdx >= nextDlg.msgs.length) {
      choiceArea.innerHTML = '';
      state.choiceLock = true;
      enableBackBtn(true); // 选项出现，解锁返回
      nextDlg.choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = ch.text;
        btn.onclick = () => makeChoice(nextDlg, ch);
        choiceArea.appendChild(btn);
      });
      scrollBottom(list);
      return;
    }

    const m = nextDlg.msgs[msgIdx];

    if (isRestoring) {
      // 恢复模式：快速展示之前已经播过的消息，不加打字动画
      addBubble(list, m.who === 'them' ? 'them' : 'mine', m.text, c);
      state.msgs[charKey].push({ who:m.who, text:m.text });
      msgIdx++;
      state.dlgProgress[nextDlg.id] = msgIdx;
      scrollBottom(list);
      setTimeout(showNextMsg, 80);
      return;
    }

    // 正常播放模式：打字动画 + 延时
    const delay = msgIdx === 0 ? 500 : 1200;
    const typing = document.createElement('div');
    typing.className = 'typing-indicator';
    typing.id = 'typingInd';
    typing.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    list.appendChild(typing);
    scrollBottom(list);

    setTimeout(() => {
      if (state.currentChar !== charKey) return;
      document.getElementById('typingInd')?.remove();
      addBubble(list, m.who === 'them' ? 'them' : 'mine', m.text, c);
      state.msgs[charKey].push({ who:m.who, text:m.text });
      msgIdx++;
      state.dlgProgress[nextDlg.id] = msgIdx;
      scrollBottom(list);
      if (state.currentChar === charKey) {
        setTimeout(showNextMsg, 600);
      }
    }, delay);
  }

  showNextMsg();
}

function addBubble(list, who, text, char) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${who === 'them' ? 'msg-theirs' : 'msg-mine'}`;
  if (who === 'them') {
    wrapper.innerHTML = `<div class="msg-avatar" style="background:${char.color}22">${char.emoji}</div><div><div class="msg-bubble">${text}</div><div class="msg-time">${getTimeStr()}</div></div>`;
  } else {
    wrapper.innerHTML = `<div><div class="msg-bubble">${text}</div><div class="msg-time">${getTimeStr()}</div></div>`;
  }
  list.appendChild(wrapper);
}

function makeChoice(dlg, choice) {
  if (!state.choiceLock) return;
  state.choiceLock = false;

  // 应用效果
  (choice.effects || []).forEach(eff => {
    if (eff[0] === 'trust') state.trust[eff[1]] = (state.trust[eff[1]] || 50) + eff[2];
    else if (eff[0] === 'progress') state.progress = (state.progress || 0) + (eff[1] || 0);
    else if (eff[0] === 'line') state.line = eff[1];
    else if (eff[0] === 'flag') state.flags[eff[1]] = eff[2];
  });

  // 添加玩家回复
  const list = document.getElementById('msgList');
  const c = CHARACTERS[state.currentChar];
  addBubble(list, 'mine', choice.text, c);
  state.msgs[state.currentChar].push({ who:'mine', text:choice.text });

  // 禁用按钮
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  // 标记完成
  state.done[dlg.id] = true;

  // 打字 → 回复
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.id = 'typingInd';
  typing.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  list.appendChild(typing);
  scrollBottom(list);

  setTimeout(() => {
    document.getElementById('typingInd')?.remove();
    const idx = dlg.choices.indexOf(choice);
    const reply = dlg.reply && dlg.reply[idx] ? dlg.reply[idx] : '……';
    addBubble(list, 'them', reply, c);
    state.msgs[state.currentChar].push({ who:'them', text:reply });

    document.getElementById('choiceArea').innerHTML = '<div style="text-align:center;color:#8e8e93;font-size:13px;padding:8px;">— ✅ 对话已完成 —</div>';

    // 检查结局
    if (dlg.id === 'final') {
      setTimeout(() => showEnding(), 1500);
    }
    scrollBottom(list);
  }, 1800);
}

function showEnding() {
  const p = state.progress || 0;
  const t = state.trust;
  const line = state.line;
  let endingId;

  const lowTrust = Object.values(t).filter(v => v < 45);
  if (p < 15 && lowTrust.length >= 2) {
    endingId = 'failure';
  } else if (p >= 45 && Object.values(t).every(v => v >= 50)) {
    endingId = 'hidden';
  } else {
    switch(line) {
      case 'A': endingId = (p >= 35 && t.zhou >= 45) ? 'A_good' : 'A_bad'; break;
      case 'B': endingId = (t.wang >= 55) ? 'B_good' : 'B_bad'; break;
      case 'C': endingId = (t.zhou >= 55) ? 'C_good' : 'C_bad'; break;
      case 'D': endingId = (t.fei >= 55) ? 'D_good' : 'D_bad'; break;
      default: endingId = 'A_bad';
    }
  }

  const ending = ENDINGS[endingId];
  if (!ending) return;
  const list = document.getElementById('msgList');
  const el = document.createElement('div');
  el.innerHTML = `
    <div style="text-align:center;padding:24px 16px;background:${ending.color}15;border-radius:12px;margin-top:12px;">
      <div style="font-size:28px;margin-bottom:8px;">${ending.title}</div>
      <div style="font-size:14px;color:#555;line-height:1.6;min-height:60px;">${ending.desc}</div>
      <div style="font-size:12px;color:#999;margin-top:12px;text-align:left;padding:0 12px;">
        <div style="margin-bottom:4px;">📊 项目进度: ${p}%</div>
        <div>🤝 信任度: 周姐${t.zhou} 小林${t.xiao} 晓晓${t.xiaoxiao} 王总${t.wang} 阿飞${t.fei} 可可${t.ke}</div>
      </div>
      <button style="margin-top:16px;padding:10px 24px;border-radius:8px;background:#007aff;color:#fff;border:none;font-size:15px;cursor:pointer;" onclick="resetGame()">🔄 重新开始</button>
    </div>`;
  list.appendChild(el);
  scrollBottom(list);
}

function resetGame() {
  initState();
  backToList();
}

function scrollBottom(el) {
  setTimeout(() => { el.scrollTop = el.scrollHeight; }, 60);
}

function getTimeStr() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

renderConversations();
</script>
</body>
</html>
